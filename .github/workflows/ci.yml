name: CI

on:
  push:
    branches: [master, main, "claude/**"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          # Production deps: --require-hashes enforces the lock file
          pip install --require-hashes -r requirements.lock
          # Test tooling installed separately (not production runtime, not in lock)
          pip install pytest==8.3.5

      - name: Run tests
        env:
          CAAMS_SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-test-secret-key-32-chars-exactly' }}
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff==0.9.10

      - name: Ruff check (errors and warnings)
        run: ruff check app/ tests/ --select E,W,F --ignore E501

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.9.0

      - name: Audit dependencies for known CVEs
        # Audit the lock file so transitive dependencies are also scanned,
        # not just the direct dependencies listed in requirements.txt.
        run: pip-audit -r requirements.lock --progress-spinner off
